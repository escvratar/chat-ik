name: Tauri Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_FETCH_RETRIES: 8
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_NETWORK_TIMEOUT: 600000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY || 'set_in_repo_variables' }}
          VITE_TURN_USERNAME: ${{ vars.VITE_TURN_USERNAME || 'set_in_repo_variables' }}
          VITE_TURN_PASSWORD: ${{ vars.VITE_TURN_PASSWORD || 'set_in_repo_variables' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}
