name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_FETCH_RETRIES: 8
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_NETWORK_TIMEOUT: 600000
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Build frontend
        env:
          VITE_VAPID_PUBLIC_KEY: test_key_for_ci
          VITE_TURN_USERNAME: test_user
          VITE_TURN_PASSWORD: test_pass
        run: npm run build

  backend-install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install
